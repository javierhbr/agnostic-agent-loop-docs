name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Docusaurus Auto Actions
        uses: sunny0826/auto-docs-action@v0.1.7
        with:
          gh-page: javierhbr/agnostic-agent-loop-docs
          docs-path: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
