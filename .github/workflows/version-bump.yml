name: Version Bump

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "npm version <patch|minor|major>"
        required: false
        default: patch
  workflow_run:
    workflows: ["Deploy Docusaurus to GitHub Pages"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  bump:
    runs-on: ubuntu-latest
    concurrency:
      group: version-bump
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch')
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_commit.author.name != 'github-actions[bot]'
          && github.event.workflow_run.head_commit.author.username != 'github-actions[bot]'
          && !contains(github.event.workflow_run.head_commit.message, 'chore: bump version'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'patch' }}"
          npm version "$RELEASE_TYPE" -m "chore: bump version to %s"

      - name: Push changes and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD
          git push origin --tags
