## Phase 2: API Endpoints

### Task 4: Plan Management API
**Status:** Pending
**Depends On:** Task 2, Task 3
**Blocking:** Task 6

**Description:**
- Implement handlers: `POST /api/v1/subscriptions/plans`, `GET /plans`, `GET /plans/:id`, `PATCH /plans/:id`
- Input validation, error responses
- Logging & tracing for each endpoint

**Acceptance Criteria:**
- [ ] `POST /plans` creates plan, returns 201 with ID
- [ ] `GET /plans` lists all plans for merchant (pagination)
- [ ] `PATCH /plans/:id` updates plan, returns 200
- [ ] Invalid input returns 400 with error message
- [ ] Logs include merchant_id, plan_id, result

**Effort:** 2-3 days

---

### Task 5: Subscription Lifecycle API
**Status:** Pending
**Depends On:** Task 2, Task 3, Task 4
**Blocking:** Task 6, Task 8

**Description:**
- Implement handlers: `POST /api/v1/subscriptions` (create), `GET /subscriptions` (list), `GET /subscriptions/:id`, `DELETE /subscriptions/:id` (cancel)
- On creation: validate plan exists, generate ID, set next_charge_date, insert record
- Emit `subscription.created` event
- On deletion: set status = CANCELLED, emit event

**Acceptance Criteria:**
- [ ] `POST /subscriptions` creates subscription, returns 201
- [ ] `GET /subscriptions/:id` returns subscription record
- [ ] `DELETE /subscriptions/:id` cancels subscription, status = CANCELLED
- [ ] `subscription.created` event emitted on creation
- [ ] Logs include subscription_id, customer_id, amount, status

**Effort:** 3-4 days

