## Phase 3: Business Logic & Scheduler

### Task 6: Subscription Service (Business Logic)
**Status:** Pending
**Depends On:** Task 3 (queries), Task 5 (APIs depend on this)

**Description:**
- Implement `SubscriptionService` struct with methods:
  - `CreatePlan(ctx, merchantID, req) (*Plan, error)`
  - `CreateSubscription(ctx, req) (*Subscription, error)`
  - `CancelSubscription(ctx, subscriptionID) error`
  - `SuspendSubscription(ctx, subscriptionID) error`
- Add business validation: duplicate check, merchant active check
- Add audit logging (who, when, what)

**Acceptance Criteria:**
- [ ] All methods return correct types
- [ ] Validation prevents invalid states
- [ ] Audit logs created for each operation
- [ ] Unit tests cover 4+ edge cases (see impl-spec)

**Effort:** 2-3 days

---

### Task 7: Daily Charge Scheduler
**Status:** Pending
**Depends On:** Task 3 (queries), Task 6 (service logic)
**Blocking:** Task 8

**Description:**
- Implement `BillingScheduler` struct with:
  - `RunDailyScheduler(ctx) error` — runs every 6 hours
  - Finds subscriptions with next_charge_date <= today
  - Emits `subscription.renew_requested` event for each
  - Handles idempotency (don't emit duplicate events)
- Integration with task scheduler (Cron, APScheduler equivalent)

**Acceptance Criteria:**
- [ ] Scheduler finds correct subscriptions
- [ ] `subscription.renew_requested` events emitted
- [ ] Events include: subscription_id, customer_id, amount, stripe_token_id
- [ ] Idempotency works (running twice = one event published)
- [ ] Logs show job execution, count of subscriptions processed

**Effort:** 2-3 days

---

## Phase 4: Event Publishing & Integration

### Task 8: Event Publishing (Event Bus Integration)
**Status:** Pending
**Depends On:** Task 6 (events emitted from service), Task 7 (scheduler emits)
**Blocking:** Task 9

**Description:**
- Implement `EventPublisher` struct:
  - `PublishEvent(ctx, event) error`
  - Connects to event bus (Kafka, RabbitMQ, AWS SNS, etc.)
  - Serializes event to JSON
  - Records published event in `subscription_events` table
- Implement error handling: retry on failure, dead-letter queue

**Acceptance Criteria:**
- [ ] Events published to bus successfully
- [ ] Event schema: { subscription_id, customer_id, merchant_id, event_type, timestamp, ...}
- [ ] Published events recorded in DB
- [ ] Retry logic handles transient failures
- [ ] Failed events go to dead-letter queue

**Effort:** 2-3 days

---

### Task 9: Integration with Payments Service (Event Consumption)
**Status:** Pending
**Depends On:** Task 7 (scheduler), Task 8 (events)

**Description:**
- Set up event bus subscriptions to receive charge results from Payments Service
- Update subscription state based on charge results:
  - Charge succeeded → update next_charge_date, status = ACTIVE
  - Charge failed → update status = SUSPENDED_PAYMENT_FAILED, emit event
- Emit `subscription.renewed` or `subscription.suspended` events

**Acceptance Criteria:**
- [ ] Billing Service listens to `charge.completed` and `charge.failed` events
- [ ] Updates subscription records correctly based on event
- [ ] Emits `subscription.renewed` or `subscription.suspended` events
- [ ] Logs show event received, action taken, result

**Effort:** 2-3 days

---

## Phase 5: Testing & Observability

### Task 10: Integration Tests & Observability Instrumentation
**Status:** Pending
**Depends On:** All prior tasks (1-9)

**Description:**
- Write integration tests covering happy path and edge cases:
  - Create plan → create subscription → charge → verify state
  - Cancel subscription → verify no future charges
  - Charge fails → verify suspension
  - Duplicate event → verify idempotency
- Add logging, metrics, tracing (see impl-spec-billing.md Observability section):
  - Structured JSON logs for every lifecycle event
  - Metrics: counters for created/cancelled, gauges for active count
  - Traces: distributed traces for charge flow
  - Alerts configured: error rate, latency

**Acceptance Criteria:**
- [ ] 8+ integration tests, all passing
- [ ] Edge case tests pass (4+ from impl-spec)
- [ ] Logs visible in log aggregation (structured format)
- [ ] Metrics visible in monitoring dashboard
- [ ] Traces viewable in trace collector (Jaeger, Zipkin, etc.)
- [ ] Alerts configured and tested

**Effort:** 3-4 days

