## Phase 1: Data Model & Migrations

### Task 1: Database Schema & Migrations
**Status:** Pending
**Blocking:** Tasks 2, 4, 5, 6 depend on this

**Description:**
- Create migration files for `plans`, `subscriptions`, `subscription_events` tables (see impl-spec-billing.md Data Model section)
- Add indexes for scheduler queries (next_charge_date, status)
- Add audit trail table `subscription_events` for event sourcing

**Acceptance Criteria:**
- [ ] Migration runs without errors in dev environment
- [ ] All 3 tables created with correct schema
- [ ] Indexes exist: (merchant_id), (next_charge_date), (status)
- [ ] Foreign key constraints defined

**Effort:** 2-3 days

---

### Task 2: Subscription Models & Types
**Status:** Pending
**Depends On:** Task 1 (schema exists)
**Blocking:** Task 4

**Description:**
- Create Go types: `Plan`, `Subscription`, `SubscriptionEvent` (see impl-spec-billing.md Code Changes)
- Add validation methods: `ValidatePlan()`, `ValidateSubscription()`
- Add helper methods: `IsCancellable()`, `IsChargeable()`

**Acceptance Criteria:**
- [ ] `Plan` type has fields: id, merchant_id, name, amount_cents, interval, created_at
- [ ] `Subscription` type has fields: id, merchant_id, customer_id, plan_id, status, next_charge_date
- [ ] Unit tests for validation (amount > 0, valid interval, etc.)
- [ ] JSON marshaling/unmarshaling works

**Effort:** 1-2 days

---

### Task 3: Database Access Layer (Queries)
**Status:** Pending
**Depends On:** Task 1 (schema), Task 2 (types)
**Blocking:** Task 4, 5

**Description:**
- Implement CRUD queries: `CreatePlan`, `GetPlan`, `ListPlans`, `GetSubscription`, `CreateSubscription`, `CancelSubscription`
- Implement scheduler query: `GetSubscriptionsDueToday()` (SELECT * FROM subscriptions WHERE next_charge_date <= TODAY AND status = 'ACTIVE')
- Add transaction support for atomic operations

**Acceptance Criteria:**
- [ ] All CRUD operations work (tested in isolation)
- [ ] `GetSubscriptionsDueToday()` returns correct results
- [ ] Transactions prevent partial writes
- [ ] Errors handled gracefully (not found, constraint violations)

**Effort:** 3-4 days

